<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Difícil de Explicar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top,#171717,#0d1117 60%);

    color:white;

    overflow-x:hidden;
}

/* Fondo animado */

body::before{

content:"";

position:fixed;

width:100%;

height:100%;

background:

linear-gradient(90deg,
transparent,
rgba(0,255,255,.05),
transparent);

animation:mover 8s linear infinite;

pointer-events:none;
}

@keyframes mover{

0%{
transform:translateX(-100%);
}

100%{
transform:translateX(100%);
}
}

header{

text-align:center;

padding:60px 20px;
}

header h1{

    font-size:4rem;

    letter-spacing:3px;

    color:#fff;
}

header p{

    color:#8f96a3;

    margin-top:10px;
}

.container{

max-width:1300px;

margin:auto;

padding:30px;
}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:35px;
}

/* OSCURECER LAS DEMÁS */

.cards:hover .card{

    opacity:.45;

    filter:brightness(.6);

    transform:scale(.97);
}


.card{

    position:relative;

    overflow:hidden;

    border-radius:22px;

    background:

    linear-gradient(
    145deg,

    rgba(255,255,255,.06),

    rgba(255,255,255,.02)
    );

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.08);

    transition:.4s ease;

    cursor:pointer;
}

/* LA CARD ACTIVA */

.card:hover::before{

left:150%;
}


.card::before{

content:"";

position:absolute;

top:-150%;

left:-50%;

width:80%;

height:400%;

background:

linear-gradient(

transparent,

rgba(255,255,255,.15),

transparent

);

transform:rotate(25deg);

transition:.7s;
}

.cards .card:hover{

    opacity:1;

    filter:none;

    transform:

    scale(1.05)

    translateY(-10px);

    box-shadow:

    0 0 20px rgba(115,140,255,.15),

    0 0 50px rgba(85,95,150,.12),

    0 20px 40px rgba(0,0,0,.5);

    border:

    1px solid rgba(130,150,255,.3);
}

.card img{

width:100%;

height:280px;

object-fit:cover;
}

.info{

    padding:25px;

    text-align:center;
}

.info h2{

    font-size:2rem;

    margin-bottom:10px;
}

.info p{

    color:#9ca3af;

    margin-bottom:20px;
}   

.btn{

    display:inline-block;

    text-decoration:none;

    color:white;

    padding:12px 28px;

    border-radius:30px;

    background:

    rgba(255,255,255,.08);

    border:

    1px solid rgba(255,255,255,.15);

    transition:.3s;
}

.btn:hover{

    background:

    rgba(255,255,255,.15);

    transform:scale(1.05);
}

</style>

</head>

<body>

<header>

<h1>🎧 DIFÍCIL DE EXPLICAR</h1>

<p>Proyecto musical gamer edition</p>

</header>

<div class="container">

<div class="cards">

<div class="card">

<img src="img/Redbull.jpg">

<div class="info">

<h2>Martín</h2>

<p>Artista favorito</p>

<a href="martin.html" class="btn">

Entrar

</a>

</div>

</div>

<div class="card">

<img src="img/Top.jpg">

<div class="info">

<h2>Ángel</h2>

<p>Artista favorito</p>

<a href="angel.html" class="btn">

Entrar

</a>

</div>

</div>

<div class="card">

<img src="img/sadboyz2.jpg">

<div class="info">

<h2>Pablo</h2>

<p>Junior H</p>

<a href="pablo.html" class="btn">

Entrar

</a>

</div>

</div>

<div class="card">

<img src="img/the-strokes.jpg">

<div class="info">

<h2>Brandon</h2>

<p>The Strokes</p>

<a href="brandon.html" class="btn">

Entrar

</a>

</div>

</div>

</div>

</div>

</body>

</html>
